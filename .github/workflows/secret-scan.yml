name: secret-scan

# Replaces the previous warn-only gitleaks.yml, which had `continue-on-error: true`
# on the scan step. A failing step there never failed the job, so the "gitleaks"
# check was structurally incapable of going red — verified across the org: 0
# failures in 644 runs. It satisfied a "required" check without ever gating.
#
# This workflow splits scanning into two jobs so a real gate can go live WITHOUT
# waiting for the legacy-history rotation/scrub (tracked separately as DA-14):
#
#   gitleaks (BLOCKING)  — scans ONLY the commits this PR itself adds
#                          (base.sha..head.sha). Fails the PR if the PR introduces
#                          a new secret. Pre-existing findings already in history
#                          are out of scope, so a green legacy tree can't wedge it.
#   gitleaks-full-history (WARN-ONLY) — scans everything, continue-on-error, so
#                          legacy findings are surfaced in logs but can never block.
#
# WHAT THIS DOES NOT CATCH: a secret that is already in the branch history before
# the PR's first commit (that's the warn-only job's territory, pending DA-14), and
# anything the ruleset doesn't match. Making the full scan blocking stays blocked
# on DA-14 (triage + rotation of existing findings across the org).
#
# Config: .gitleaks.toml — adds the Anthropic sk-ant- rule the default set misses.
#
# gacts/gitleaks@v1 has no --log-opts input (its action.yml inputs are: version,
# config-path, path, run, fail-on-error, github-token), so it cannot diff-scope on
# its own. We use `run: false` to install-only, then invoke the exported binary
# directly with --log-opts. Verified against gitleaks 8.30.1.

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege GITHUB_TOKEN. This repo is PUBLIC, so the default token grant is
# worth pinning down: both jobs only ever read the repo (checkout + scan history).
# Declared at workflow level as the default for any future job, and repeated per job
# so each job's grant is explicit at the point of definition rather than inherited.
permissions:
  contents: read

jobs:
  gitleaks:
    # Diff-scoped BLOCKING gate. PR-only: on push there is no PR base/head to diff.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout + `gitleaks git` over base..head. Nothing is written.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gacts/gitleaks@v1
        id: install
        with:
          run: false          # install only; the action has no --log-opts input
      - name: Scan only this PR's own commits
        env:
          BIN: ${{ steps.install.outputs.gitleaks-bin }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          "$BIN" git . --config .gitleaks.toml \
            --log-opts="$BASE..$HEAD" --redact --exit-code 1 --no-banner

  gitleaks-full-history:
    # Warn-only: surfaces legacy findings without ever blocking CI (DA-14).
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read      # checkout + full-history scan. Read-only; results go to the log.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gacts/gitleaks@v1
        continue-on-error: true
        with:
          config-path: .gitleaks.toml
