name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

# Least-privilege GITHUB_TOKEN. The Azure SWA action needs pull-requests:write
# to post the preview-URL comment and to close the PR staging environment;
# contents:read is for checkout. Resolves the CodeQL "Analyze (actions)"
# missing-permissions finding.
permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs so a burst of merges to main doesn't race: only the
# latest deploy runs (earlier ones show "cancelled", not a scary "failure").
# Keyed per-ref so PR previews don't cancel each other or main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BUBBLE_API_URL: ${{ secrets.VITE_BUBBLE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_TRACKING_URL: https://admin.learneris.com

      # Dependabot runs get no repo secrets, so this step can't authenticate and
      # would always fail. Skip it on Dependabot PRs (the build above still runs,
      # so the dependency bump is still validated); real deploys are unaffected.
      - name: Deploy to Azure Static Web Apps
        if: github.actor != 'dependabot[bot]'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: dist

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR staging environment
    steps:
      - name: Close staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
