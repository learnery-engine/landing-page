name: gitleaks
on:
  push:
  pull_request:
jobs:
  scan:
    name: gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gacts/gitleaks@v1
        continue-on-error: true
        # License-free scanner. gitleaks-action@v2 needs a paid GITLEAKS_LICENSE
        # org secret and failed on every run before scanning. Warn-only to match
        # the org secret-scan pattern; drop continue-on-error after a rotation pass.
