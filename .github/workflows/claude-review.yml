# Automated Claude PR reviewer — stands in for a human reviewer.
# Auth: Claude Max via CLAUDE_CODE_OAUTH_TOKEN. Model: Opus 4.8. Advisory (does not block).
name: Claude Review
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
permissions:
  contents: read
  pull-requests: write
  id-token: write
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          # Dependabot PRs need this or the reviewer refuses them outright and
          # their check never goes green. Scoped to dependabot[bot] rather than
          # "*" because this job carries the Claude credential — every open bot
          # PR in this repo is dependabot, so a wildcard buys nothing.
          allowed_bots: "dependabot[bot]"
          prompt: |
            Review this pull request (REPO: ${{ github.repository }}, PR #${{ github.event.pull_request.number }}).
            Report ONLY real defects: correctness bugs, security issues (XSS,
            injection, leaked secrets/PII, unsafe rendering of untrusted input),
            data-loss, and regressions. Skip style/formatting nits.
            This repo is ~90% AI-generated and self-merged with no human reviewer,
            so you are the safety net.
            For any user-facing change (a page, component, or rendered output),
            check the PR description includes a screenshot/mockup of the end
            state; flag it if missing.
            POST findings as inline comments (file:line + the concrete risk + a
            one-line fix). End with a summary comment whose FIRST line is a
            verdict: "Verdict: REQUEST CHANGES — N blocking" or
            "Verdict: APPROVE — 0 blocking, M nit(s)" (REQUEST CHANGES iff there
            is at least one blocking finding; nits never block).
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
      - name: Fail on a silent no-op review
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          PR='${{ github.event.pull_request.number }}'
          REPO='${{ github.repository }}'
          # PRs that edit the review workflow are skipped by GitHub by design — don't enforce.
          if gh pr diff "$PR" --repo "$REPO" --name-only 2>/dev/null | grep -q '\.github/workflows/claude-review\.yml'; then
            echo "PR edits the review workflow → reviewer skip is expected; not enforcing."
            exit 0
          fi
          latest=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq '[.[] | select(.user.login=="claude[bot]")] | last | .body // ""' 2>/dev/null || true)
          # The two failure paths below mean DIFFERENT things and have different
          # fixes. Keep them apart — conflating them cost a full day on
          # 2026-07-21, because the placeholder case used to advise updating the
          # branch, which is unrelated and never helps.
          #
          # No comment at all = the action never got far enough to post one.
          # That is the genuine workflow-validation skip, and it is the only
          # case where branch staleness is a plausible cause.
          if [ -z "$latest" ]; then
            echo "::error::No Claude review was posted at all, so the reviewer never ran. This is the workflow-validation skip: it happens when this branch's copy of .github/workflows/claude-review.yml differs from the one on '${{ github.event.pull_request.base.ref }}'. Merge '${{ github.event.pull_request.base.ref }}' into the branch and push. Failing so a skipped review can't show green."
            exit 1
          fi
          # Placeholder only = the action DID run, reached the model, and failed.
          # Branch state is irrelevant here. The cause is printed in the job log:
          # open the claude-code-action step and read the `result` field of the
          # JSON result block. Verified example — an invalid Authorization header
          # value means the CLAUDE_CODE_OAUTH_TOKEN secret holds a string that is
          # not a legal HTTP header (usually a trailing newline from pasting it),
          # which shows up as duration_api_ms 0 because no request is ever sent.
          if printf '%s' "$latest" | grep -qiF "get back to you"; then
            echo "::error::Claude posted its placeholder and then failed, so the reviewer DID run — do not update the branch, that is unrelated. Open the claude-code-action step in this job and read the 'result' field of the JSON result block; it carries the actual error. If it mentions an invalid Authorization header, the CLAUDE_CODE_OAUTH_TOKEN secret's value is malformed (typically a trailing newline) and must be re-saved. Failing so a no-op review can't show green."
            exit 1
          fi
          echo "Claude review completed (placeholder was replaced with real content)."
