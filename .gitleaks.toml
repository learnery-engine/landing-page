# Learneris gitleaks configuration.
#
# Why this file exists: gitleaks' default ruleset does NOT detect Anthropic API
# keys. Verified 2026-07-16 — a realistic `sk-ant-api03-…` key scans clean under
# the stock rules. Learneris is an Anthropic-dependent product, so our most
# widely-held credential class was invisible to our only secret-detection control.
#
# Probe method note: do NOT test this rule with a key containing "fake", "test",
# "example", or "1234567890". `useDefault = true` inherits gitleaks' global
# stopword allowlist, which suppresses those and makes a WORKING rule look broken.
# Generate a random, realistic-shaped body instead.

title = "Learneris gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-…) — not covered by the gitleaks default ruleset"
regex = '''sk-ant-(?:api|sid)[0-9]{2}-[A-Za-z0-9_\-]{80,120}'''
keywords = ["sk-ant-"]
