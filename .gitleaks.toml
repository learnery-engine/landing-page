# Learneris gitleaks configuration.
#
# Why this file exists: gitleaks' default ruleset does NOT detect Anthropic API
# keys. Verified 2026-07-16 — a realistic `sk-ant-api03-…` key scans clean under
# the stock rules. Learneris is an Anthropic-dependent product, so our most
# widely-held credential class was invisible to our only secret-detection control.
#
# The subtype segment is matched generically ([a-z]{2,10}[0-9]{2}) rather than as a
# fixed (api|sid) alternation. A narrow alternation silently missed `sk-ant-admin01-…`
# — the ADMIN key class, which is the highest-privilege one we hold (org / member /
# API-key management). The generic form covers api / sid / admin and any subtype
# Anthropic adds later, without matching placeholder text like sk-ant-api03-YOUR_KEY_HERE.
#
# Probe method note: when testing this rule, use a RANDOM realistic key body.
# Verified against gitleaks 8.30.1: the inherited global stopword list has only
# two entries — a literal UUID and `abcdefghijklmnopqrstuvwxyz` — so a body
# containing the alphabet string is silently dropped. Words like "fake"/"test"/
# "example"/"1234567890" are NOT suppressed for this rule (they belong to
# `generic-api-key`'s rule-scoped list); an earlier version of this comment
# claimed they were, which was wrong. A random body avoids the issue entirely.
#
# The caveat that DOES matter: the default allowlist's `paths` rule skips
# .pdf/.docx/image files wholesale, so the same key is caught in a .txt and
# invisible in a .pdf copy. Accepted, not worked around. [CONFIRM: Eng] if this
# repo stores document exports.

title = "Learneris gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "anthropic-api-key"
description = "Anthropic key (sk-ant-…), any subtype — api / sid / admin — not covered by the gitleaks default ruleset"
regex = '''sk-ant-[a-z]{2,10}[0-9]{2}-[A-Za-z0-9_\-]{80,120}'''
keywords = ["sk-ant-"]
